[package]
    authors.workspace    = true
    categories           = ["api-bindings", "development-tools"]
    description          = "Essentia LLM Integration Plugin - Pure std-only Grok/Copilot API access"
    edition.workspace    = true
    keywords             = ["llm", "grok", "ai", "essentia", "copilot"]
    license.workspace    = true
    name                 = "essentia_llm_plugin"
    publish.workspace    = true
    repository.workspace = true
    version.workspace    = true

[lints]
    workspace = true

[lib]
    name = "essentia_llm_plugin"
    path = "src/lib.rs"

[[bin]]
    name = "essentia_grok_cli"
    path = "src/main.rs"

[dependencies]
    # Core trait definitions for FlexForge integration
    essentia_traits = {workspace = true}
    # CR-164: Canonical crypto primitives (zero external deps, SSOP-compliant)
    essentia_core_utils = {workspace = true}
    # Zero third-party dependencies - pure Rust standard library only
    # SOVEREIGN STD-ONLY ARCHITECTURE (SSOP)
